<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextGuard Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
        .log-success { color: #4ade80; }
        .terminal {
            background-color: #1e293b;
            font-family: 'Courier New', Courier, monospace;
            overflow-y: auto;
            max-height: 400px;
        }
    </style>
</head>
<body class="min-h-screen p-6 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">ContextGuard</h1>
                <p class="text-slate-400 text-sm">Local LLM Context Optimizer & Router</p>
            </div>
            <div class="flex space-x-4">
                <div class="bg-slate-800 p-3 rounded-lg text-center">
                    <div class="text-xs text-slate-400 uppercase tracking-wider">Total Tokens Saved</div>
                    <div id="totalTokensSaved" class="text-2xl font-bold text-green-400">0</div>
                </div>
                <div class="bg-slate-800 p-3 rounded-lg text-center">
                    <div class="text-xs text-slate-400 uppercase tracking-wider">Avg TTFT (ms)</div>
                    <div id="avgTtft" class="text-2xl font-bold text-blue-400">0</div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- Live Stats -->
            <div class="bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">Performance Trends</h2>
                <div class="relative h-64">
                    <canvas id="statsChart"></canvas>
                </div>
            </div>

            <!-- Context Map Viewer -->
            <div class="bg-slate-800 rounded-xl p-5 shadow-lg border border-slate-700">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">Context Window Map</h2>
                <div class="text-sm text-slate-400 mb-2">Visual representation of the most recent active context window.</div>
                <div class="flex flex-col space-y-2" id="contextMap">
                    <!-- Dynamic Bars -->
                    <div class="w-full bg-slate-700 rounded h-8 flex items-center px-3 text-xs text-slate-300">
                        Waiting for requests...
                    </div>
                </div>
                <div class="mt-4 flex space-x-4 text-xs">
                    <div class="flex items-center"><span class="w-3 h-3 bg-blue-500 rounded-full mr-2"></span> Intact</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-yellow-500 rounded-full mr-2"></span> Summarized</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-red-500 rounded-full mr-2"></span> Dropped</div>
                </div>
            </div>
        </div>

        <!-- Router Logs -->
        <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 overflow-hidden">
            <div class="p-4 border-b border-slate-700 bg-slate-900 flex justify-between items-center">
                <h2 class="text-lg font-semibold">Router Terminal</h2>
                <button id="refreshBtn" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded transition">Refresh</button>
            </div>
            <div id="logContainer" class="terminal p-4 text-sm leading-relaxed whitespace-pre-wrap">
                <!-- Logs injected here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
